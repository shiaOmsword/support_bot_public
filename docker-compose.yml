services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  migrate:
    build: .
    restart: "no"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head

volumes:
  pgdata:
    name: support_bot_pgdata